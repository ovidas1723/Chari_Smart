<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000">
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L12,6 L0,12 z" fill="#244b3e"/></marker>
    <style>
      .title{font:700 36px Arial,sans-serif;fill:#12372a}.subtitle{font:600 18px Arial,sans-serif;fill:#49655c}.entity{fill:#ffffff;stroke:#275f4d;stroke-width:3}.process{fill:#176b55;stroke:#0f4d3d;stroke-width:4}.entityName{font:700 25px Arial,sans-serif;fill:#17372d}.entitySub{font:18px Arial,sans-serif;fill:#4b635b}.processName{font:700 30px Arial,sans-serif;fill:#fff}.flow{stroke:#244b3e;stroke-width:3.5;fill:none;marker-end:url(#arrow)}.flowLabel{font:600 18px Arial,sans-serif;fill:#17372d}.labelBg{fill:#f2f8f5;stroke:#c8ded5;stroke-width:1.5}.legend{font:16px Arial,sans-serif;fill:#4b635b}
    </style>
  </defs>
  <rect width="1600" height="1000" fill="#eef7f3"/>
  <text x="800" y="52" text-anchor="middle" class="title">ChariSmart Context DFD</text>
  <text x="800" y="82" text-anchor="middle" class="subtitle">One central process with balanced inputs and outputs for all external entities</text>

  <!-- External entities -->
  <rect x="40" y="365" width="360" height="180" rx="14" class="entity"/>
  <text x="220" y="427" text-anchor="middle" class="entityName">Donor</text>
  <text x="220" y="462" text-anchor="middle" class="entitySub">Restaurant / Wedding Hall</text>
  <text x="220" y="490" text-anchor="middle" class="entitySub">Household</text>

  <rect x="1200" y="365" width="360" height="180" rx="14" class="entity"/>
  <text x="1380" y="427" text-anchor="middle" class="entityName">Recipient</text>
  <text x="1380" y="465" text-anchor="middle" class="entitySub">NGO / Orphanage</text>

  <rect x="650" y="105" width="300" height="130" rx="14" class="entity"/>
  <text x="800" y="183" text-anchor="middle" class="entityName">Admin</text>

  <rect x="650" y="805" width="300" height="130" rx="14" class="entity"/>
  <text x="800" y="863" text-anchor="middle" class="entityName">Volunteer / Rider</text>
  <text x="800" y="895" text-anchor="middle" class="entitySub">Pickup and delivery</text>

  <!-- Central process -->
  <rect x="600" y="365" width="400" height="220" rx="52" class="process"/>
  <text x="800" y="458" text-anchor="middle" class="processName">0.0</text>
  <text x="800" y="505" text-anchor="middle" class="processName">ChariSmart System</text>

  <!-- Donor flows -->
  <path d="M400 410 H600" class="flow"/>
  <rect x="410" y="350" width="180" height="50" rx="9" class="labelBg"/>
  <text x="500" y="372" text-anchor="middle" class="flowLabel">Registration and</text>
  <text x="500" y="394" text-anchor="middle" class="flowLabel">donation details</text>

  <path d="M600 525 H400" class="flow"/>
  <rect x="410" y="535" width="180" height="50" rx="9" class="labelBg"/>
  <text x="500" y="557" text-anchor="middle" class="flowLabel">Donation status</text>
  <text x="500" y="579" text-anchor="middle" class="flowLabel">and notifications</text>

  <!-- Recipient flows -->
  <path d="M1200 410 H1000" class="flow"/>
  <rect x="1010" y="350" width="180" height="50" rx="9" class="labelBg"/>
  <text x="1100" y="372" text-anchor="middle" class="flowLabel">Registration and</text>
  <text x="1100" y="394" text-anchor="middle" class="flowLabel">food request</text>

  <path d="M1000 525 H1200" class="flow"/>
  <rect x="1010" y="535" width="180" height="50" rx="9" class="labelBg"/>
  <text x="1100" y="557" text-anchor="middle" class="flowLabel">Match and</text>
  <text x="1100" y="579" text-anchor="middle" class="flowLabel">delivery status</text>

  <!-- Admin flows -->
  <path d="M710 235 V365" class="flow"/>
  <rect x="430" y="255" width="260" height="58" rx="9" class="labelBg"/>
  <text x="560" y="278" text-anchor="middle" class="flowLabel">Verification decisions</text>
  <text x="560" y="301" text-anchor="middle" class="flowLabel">and assignments</text>

  <path d="M890 365 V235" class="flow"/>
  <rect x="910" y="255" width="260" height="58" rx="9" class="labelBg"/>
  <text x="1040" y="278" text-anchor="middle" class="flowLabel">Pending submissions</text>
  <text x="1040" y="301" text-anchor="middle" class="flowLabel">and operational data</text>

  <!-- Volunteer flows -->
  <path d="M710 805 V585" class="flow"/>
  <rect x="420" y="670" width="260" height="58" rx="9" class="labelBg"/>
  <text x="550" y="693" text-anchor="middle" class="flowLabel">Pickup and delivery</text>
  <text x="550" y="716" text-anchor="middle" class="flowLabel">updates</text>

  <path d="M890 585 V805" class="flow"/>
  <rect x="920" y="670" width="220" height="58" rx="9" class="labelBg"/>
  <text x="1030" y="705" text-anchor="middle" class="flowLabel">Delivery assignment</text>

  <text x="800" y="980" text-anchor="middle" class="legend">External entity = rectangle | Process = rounded green rectangle | Arrow = named data flow</text>
</svg>

