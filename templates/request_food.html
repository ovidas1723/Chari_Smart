{% extends "base.html" %}
{% block content %}
<div class="page-title"><h2>Request Food</h2><p>NGO/orphanage requests are verified and matched by area, need time, capacity, and priority.</p></div>
<div class="form-card wide"><form method="POST" class="grid-form">
<label>Beneficiary group<input type="text" name="beneficiary_group" placeholder="Children, elderly, disaster-affected families" required></label>
<label>Requested food type<input type="text" name="requested_food_type" placeholder="Rice meal, snacks, any safe meal"></label>
<label>Quantity needed<input type="number" name="quantity_needed" min="1" required></label>
<label>Area<input type="text" name="area" value="{{ auth_user.area }}" required></label>
<label class="full-line">Delivery address<input type="text" name="delivery_address" required></label>
<label>Needed before<input type="datetime-local" name="needed_before" required></label>
<label>Priority<select name="priority"><option value="normal">Normal</option><option value="urgent">Urgent</option></select></label>
<label class="full-line">Message<textarea name="message" rows="4"></textarea></label>
<button class="btn" type="submit">Submit Request</button></form></div>
{% endblock %}
